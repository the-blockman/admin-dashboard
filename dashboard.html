<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="side-bar">
      <h1>Dashboard</h1>
      <ul>
        <li>Home</li>
        <li>Profile</li>
        <li>Messages</li>
        <li>History</li>
        <li>Tasks</li>
        <li>Communities</li>
      </ul>
      <ul>
        <li>Settings</li>
        <li>Support</li>
        <li>Privacy</li>
      </ul>
    </div>
    <div class="content">
      <header>
        <div class="header-row">
          <div class="header-left">
            <img
              id="icon"
              src="assets/icons/search-black.svg"
              alt="search icon"
            />
            <input type="text" />
          </div>
          <div class="header-right">
            <img
              src="assets/icons/notification-black.svg"
              alt="notification active icon"
              id="icon"
            />
            <div class="avatar-wrapper"></div>
            <b>Praise Maduka</b>
          </div>
        </div>
        <div class="header-row">
          <div class="header-left">
            <div class="avatar-wrapper-big"></div>
            <div class="greeting">
              <p>Hi there,</p>
              <h3>Praise Maduka (@machado)</h3>
            </div>
          </div>
          <div class="header-right">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
          </div>
        </div>
      </header>
      <main></main>
    </div>
  </body>
</html>
